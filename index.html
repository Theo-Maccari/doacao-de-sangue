<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Doação de Sangue</h1>
    </header>

    <main>

        <form id="forms">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Insira seu nome">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Insira seu email">
        <br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" placeholder="Insira seu telefone">
        <br>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Insira sua cidade">
        <br>

        <label for="estado">Estado:</label>
        <input type="text" id="estado" placeholder="Insira seu estado">
        <br>

        <label for="peso">Peso:</label>
        <input type="text" id="peso" placeholder="Insira seu peso">
        <br>

        <label for="tipo">Tipo sanguíneo:</label>
        <select name="tipo" id="tipo">
            <option value="a+">A+</option>
            <option value="a-">A-</option>
            <option value="b+">B+</option>
            <option value="b-">B-</option>
            <option value="ab+">AB+</option>
            <option value="ab-">AB-</option>
            <option value="o+">O+</option>
            <option value="o-">O-</option>
        </select>
        <br>

        <button onclick=""></button>

        </form>

    </main>



    <script src="script.js"></script>

</body>

</html>
